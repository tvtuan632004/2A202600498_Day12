# ============================================================
# Docker Compose — Full Agent Stack (Fixed Healthcheck)
# ============================================================

services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: ../../
      dockerfile: 02-docker/production/Dockerfile
      target: runtime
    deploy:
      replicas: 2
    environment:
      - ENVIRONMENT=staging
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started # Đổi từ healthy sang started để tránh bị kẹt nếu DB khởi động chậm
    healthcheck:
      # Kiểm tra cổng 8000 của chính Agent
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/8000' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ──────────────────────────────────────
  # Qdrant — Vector database
  # ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Lệnh kiểm tra an toàn: Thử curl, nếu không có dùng bash tcp check
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/health || (echo > /dev/tcp/127.0.0.1/6333) || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Cho Qdrant 20 giây để khởi động xong xuôi
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_started # Chờ Agent chạy là Nginx lên luôn
    restart: unless-stopped
    networks:
      - internal

# ──────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:


networks:
  internal:
    driver: bridge
