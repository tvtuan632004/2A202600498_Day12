services:
- type: web
name: ai-agent
runtime: python
region: singapore
plan: free

buildCommand: pip install -r requirements.txt
startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

healthCheckPath: /health
autoDeploy: true

envVars:
- key: ENVIRONMENT
value: production
- key: PYTHON_VERSION
value: 3.11.0
- key: OPENAI_API_KEY
sync: false
- key: AGENT_API_KEY
sync: false